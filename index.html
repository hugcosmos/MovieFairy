<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Fairy</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4845a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Movie Fairy">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="app-wrapper">
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题"></button>
    <div class="container" id="app"></div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/recommender.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").then(function (reg) {
        reg.addEventListener("updatefound", function () {
          var newSW = reg.installing;
          newSW.addEventListener("statechange", function () {
            if (newSW.state === "activated" && navigator.serviceWorker.controller) {
              var tip = document.createElement("div");
              tip.id = "update-tip";
              tip.innerHTML = '<span>发现新版本</span><button onclick="location.reload()">刷新</button>';
              document.body.appendChild(tip);
            }
          });
        });
        setInterval(function () { reg.update(); }, 60 * 60 * 1000);
      });
    }
  </script>
</body>
</html>
