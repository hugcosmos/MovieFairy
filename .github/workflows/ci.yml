name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check HTML valid
        run: |
          sudo apt-get update -qq && sudo apt-get install -qq -y tidy > /dev/null
          tidy -q -e index.html || true

      - name: Check JS syntax
        run: |
          for f in js/*.js; do node --check "$f" && echo "OK: $f"; done

      - name: Verify assets exist
        run: |
          test -f manifest.json || (echo "FAIL: manifest.json missing" && exit 1)
          test -f css/style.css || (echo "FAIL: css/style.css missing" && exit 1)
          test -f icons/icon-192.png || (echo "FAIL: icon-192.png missing" && exit 1)
          echo "All assets present"
